name: qortfolio-v2
channels:
  - conda-forge
  - defaults
  - anaconda

dependencies:
  # Python version
  - python=3.11

  # Core Data Science Libraries (conda versions preferred)
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - matplotlib>=3.6.0
  - seaborn>=0.12.0
  - plotly>=5.14.0

  # Scientific Computing
  - scikit-learn>=1.3.0
  - statsmodels>=0.14.0
  - openpyxl>=3.1.0
  - xlsxwriter>=3.1.0

  # Web and API
  - requests>=2.31.0
  - aiohttp>=3.8.0
  - websockets>=11.0
  - urllib3>=1.26.0

  # Configuration & Utilities
  - pyyaml>=6.0
  - tqdm>=4.65.0
  - click>=8.1.0
  - python-dotenv>=1.0.0
  - joblib>=1.3.0

  # Development Tools
  - jupyter>=1.0.0
  - ipykernel>=6.24.0
  - notebook>=6.5.0
  - ipython>=8.14.0

  # Testing & Quality (conda versions)
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  - pytest-asyncio>=0.21.0
  - black>=23.0.0
  - mypy>=1.4.0
  - flake8>=6.0.0
  - coverage>=7.2.0

  # Mathematical and Financial Computing
  - numba>=0.57.0
  - sympy>=1.12.0

  # Data Visualization
  - bokeh>=3.2.0
  - altair>=5.0.0

  # Performance
  - cython>=3.0.0

  # Install via pip (packages not available in conda or better from PyPI)
  - pip
  - pip:
    # Financial Libraries (better from PyPI)
    - yfinance>=0.2.0
    - riskfolio-lib>=4.3.0
    # Note: QuantLib-Python has limited versions available, using compatible version
    - QuantLib-Python>=1.17

    # Machine Learning 
    - keras>=2.13.0

    # Dashboard and UI
    - streamlit>=1.25.0
    - streamlit-plotly-events>=0.0.6
    - streamlit-aggrid>=0.3.4
    - streamlit-option-menu>=0.3.6

    # Advanced Financial Libraries (install these manually if needed)
    # - arch>=6.2.0
    # - pyfolio>=0.9.2
    # - empyrical>=0.5.5
    # - zipline-reloaded>=3.0.0

    # Options and Derivatives
    - mibian>=0.1.3
    # - py_vollib>=1.0.1  # Install manually if needed

    # Additional ML and Stats
    - xgboost>=1.7.0
    - lightgbm>=4.0.0
    - optuna>=3.3.0

    # Time Series
    - pykalman>=0.9.5
    - tslearn>=0.6.0

    # Risk Management (core packages only)
    - PyPortfolioOpt>=1.5.5

    # Data Sources (core)
    # - alpha-vantage>=2.3.1  # Install manually if needed
    # - polygon-api-client>=1.12.0  # Install manually if needed

    # Development and Debugging
    - memory-profiler>=0.61.0
    - line-profiler>=4.1.0
    - py-spy>=0.3.14

    # Documentation
    - sphinx>=7.1.0
    - sphinx-rtd-theme>=1.3.0

    # Additional Testing
    - pytest-benchmark>=4.0.0
    - pytest-xdist>=3.3.0
    - hypothesis>=6.82.0

variables:
  # Environment variables for development
  PYTHONPATH: $CONDA_PREFIX/lib/python3.11/site-packages
  STREAMLIT_SERVER_PORT: 8501
  STREAMLIT_SERVER_ADDRESS: localhost
  TF_CPP_MIN_LOG_LEVEL: 2  # Reduce TensorFlow logging